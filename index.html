<style>
@font-face {
  font-family: 'ONE-Mobile-Title';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/ONE-Mobile-Title.woff') format('woff');
  font-weight: normal; font-display: swap;
}
@font-face {
  font-family: 'Sunchon';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/SuncheonR.woff') format('woff');
  font-weight: 400; font-display: swap;
}
@font-face {
  font-family: 'Sunchon';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/SuncheonB.woff') format('woff');
  font-weight: 700; font-display: swap;
}
:root {
  --bg: #eef1f8; --surface: #ffffff; --surface2: #f4f6fc;
  --border: #e4e8f4; --text: #1e2340; --text-sub: #7b82a0; --text-hint: #b0b6cc;
  --accent: #5b6ef5; --accent-light: #eef0fe;
  --personal: #3db87a; --personal-bg: #e8f8f1; --personal-border: #a8e4c4; --personal-text: #1e7a4e;
  --work: #5b6ef5; --work-bg: #eef0fe; --work-border: #c0c8fa; --work-text: #3040c0;
  --holiday: #e74c3c; --holiday-bg: #fff0f0;
  --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-md: 0 4px 24px rgba(0,0,0,0.12);
}
[data-theme="dark"] {
  --bg: #12131a; --surface: #1c1d28; --surface2: #222332;
  --border: #2e2f42; --text: #e8e9f4; --text-sub: #8889a8; --text-hint: #4a4b68;
  --personal: #4cae74; --personal-bg: #1a2e22; --personal-border: #2a4435; --personal-text: #6dcc94;
  --work-bg: #1a1d38; --work-border: #2a2f58; --work-text: #7b9ef7;
  --shadow: 0 2px 12px rgba(0,0,0,0.4); --shadow-md: 0 4px 24px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sunchon', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

/* 로그인 */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #e8ecf8 0%, #f0eefa 100%); }
.login-card { background: var(--surface); border-radius: 24px; padding: 44px 40px; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow-md); }
.login-logo { width: 56px; height: 56px; background: var(--accent-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.login-card h1 { font-size: 22px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; margin-bottom: 8px; }
.login-card > p { font-size: 13px; color: var(--text-sub); margin-bottom: 32px; line-height: 1.7; }
.google-btn { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 14px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.15s; margin-bottom: 10px; }
.google-btn:hover { background: var(--surface2); border-color: var(--accent); }
.login-note { font-size: 11px; color: var(--text-hint); margin-top: 24px; line-height: 1.7; }

/* 앱 */
#app { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
.topbar { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 0 20px; height: 58px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.app-title { font-size: 16px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.app-logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.account-chips { display: flex; gap: 6px; }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; user-select: none; }
.chip.personal { background: var(--personal-bg); color: var(--personal-text); border-color: var(--personal-border); }
.chip.work { background: var(--work-bg); color: var(--work-text); border-color: var(--work-border); }
.chip.holiday { background: #fff0f0; color: #c0392b; border-color: #f5c0c0; }
.chip.off { opacity: 0.3; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.btn.primary:hover { opacity: 0.9; }
.btn.sm { padding: 6px 12px; font-size: 12px; }
.toolbar { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.period-nav { display: flex; align-items: center; gap: 4px; }
.nav-btn { width: 32px; height: 32px; border-radius: var(--radius-xs); border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-sub); transition: all 0.12s; font-family: inherit; }
.nav-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.period-label { font-size: 16px; font-weight: 600; min-width: 160px; }
.view-seg { display: flex; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 3px; gap: 2px; }
.view-seg button { padding: 5px 16px; border: none; background: transparent; font-size: 12px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; color: var(--text-sub); cursor: pointer; border-radius: var(--radius-xs); transition: all 0.15s; }
.view-seg button.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }

/* 사이드바 */
.sidebar { width: 224px; border-right: none; background: var(--bg); flex-shrink: 0; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.sidebar-section { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
.sidebar-section h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-hint); margin-bottom: 10px; }

/* 미니 캘린더 */
.mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.mini-cal-title { font-size: 13px; font-weight: 600; }
.mini-nav { background: none; border: none; cursor: pointer; color: var(--accent); padding: 3px 6px; font-size: 14px; border-radius: var(--radius-xs); transition: background 0.12s; }
.mini-nav:hover { background: var(--accent-light); }
.mini-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; text-align: center; }
.mini-wd { font-size: 9px; color: var(--text-hint); padding: 2px 0; font-weight: 700; }
.mini-d { font-size: 11px; padding: 4px 1px; border-radius: 50%; cursor: pointer; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.mini-d:hover { background: var(--accent-light); color: var(--accent); }
.mini-d.today { background: var(--accent); color: #fff; font-weight: 700; }
.mini-d.other { color: var(--text-hint); }

/* 계정 */
.account-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 12px; background: var(--surface2); margin-bottom: 6px; }
.account-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.account-email { color: var(--text-sub); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.account-label { font-weight: 600; font-size: 12px; }

/* 메모 박스 */
.sidebar-memo-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); flex-shrink: 0; }
.sidebar-memo-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: var(--surface2); border-bottom: 1.5px solid var(--border); font-size: 10px; font-weight: 700; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.8px; }
.memo-item { padding: 9px 12px; border: none; border-bottom: 1px solid var(--border); cursor: pointer; background: var(--surface); transition: background 0.12s; }
.memo-item:last-child { border-bottom: none; }
.memo-item:hover { background: var(--accent-light); }
.memo-item-title { font-size: 12px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
.memo-item-date { font-size: 10px; color: var(--text-hint); }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; display: inline-flex; align-items: center; }
.tag.personal { background: var(--personal-bg); color: var(--personal-text); }
.tag.work { background: var(--work-bg); color: var(--work-text); }

/* 캘린더 영역 */
.cal-area { flex: 1; overflow: auto; background: var(--bg); padding: 10px 10px 10px 0; }

/* 월간 */
.month-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; border: 1.5px solid var(--border); display: flex; flex-direction: column; min-height: calc(100vh - 140px); }
.month-head { display: grid; grid-template-columns: repeat(7,1fr); background: var(--surface2); border-bottom: 1.5px solid var(--border); }
.month-head-cell { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-sub); padding: 10px 4px; letter-spacing: 0.5px; }
.month-weeks { display: flex; flex-direction: column; flex: 1; }
.month-week { border-bottom: 1px solid var(--border); flex: 1; display: flex; flex-direction: column; min-height: 120px; }
.month-row-dates { display: grid; grid-template-columns: repeat(7,1fr); flex-shrink: 0; }
.month-cell-date { border-right: 1px solid var(--border); padding: 6px 6px 2px; cursor: pointer; background: var(--surface); transition: background 0.1s; min-height: 32px; }
.month-cell-date:last-child { border-right: none; }
.month-cell-date:hover { background: var(--bg); }
.month-cell-date.other { background: var(--surface2); }
.month-cell-date.other .day-n { color: var(--text-hint); }
.month-cell-date.today .day-n { background: var(--accent); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.day-n { font-size: 12px; font-weight: 600; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.month-row-evs { display: grid; grid-template-columns: repeat(7,1fr); min-height: 24px; padding: 0 2px 2px; flex-shrink: 0; }
.ev-slot { font-size: 11px; font-weight: 600; padding: 2px 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; transition: opacity 0.12s; margin: 1px 2px; min-width: 0; border-radius: var(--radius-xs); border-left: 3px solid transparent; }
.ev-slot:hover { opacity: 0.8; }
.ev-slot.personal { background: var(--personal-bg); color: var(--personal-text); border-left-color: var(--personal); }
.ev-slot.work { background: var(--work-bg); color: var(--work-text); border-left-color: var(--work); }
.ev-slot.holiday { background: #fff0f0; color: #c0392b; border-left-color: #e74c3c; }
.ev-slot.multi-start { border-radius: var(--radius-xs) 0 0 var(--radius-xs); margin-right: 0; }
.ev-slot.multi-start.personal { background: #c0dd97; border-left-color: var(--personal); }
.ev-slot.multi-start.work { background: #b5d4f4; border-left-color: var(--work); }
.ev-slot.multi-start.holiday { background: #f5c0c0; border-left-color: #e74c3c; }
.ev-slot.multi-full { border-radius: var(--radius-xs); }
.ev-slot.multi-full.personal { background: #c0dd97; color: var(--personal-text); border-left-color: var(--personal); }
.ev-slot.multi-full.work { background: #b5d4f4; color: var(--work-text); border-left-color: var(--work); }
.ev-slot.multi-full.holiday { background: #f5c0c0; color: #c0392b; border-left-color: #e74c3c; }
.ev-slot.multi-cont { border-radius: 0; margin-left: 0; margin-right: 0; border-left: none; }
.ev-slot.multi-cont.personal { background: #c0dd97; color: var(--personal-text); }
.ev-slot.multi-cont.work { background: #b5d4f4; color: var(--work-text); }
.ev-slot.multi-cont.holiday { background: #f5c0c0; color: #c0392b; }
.ev-slot.multi-end-week { border-radius: 0 var(--radius-xs) var(--radius-xs) 0; margin-left: 0; border-left: none; }
.ev-slot.multi-end-week.personal { background: #c0dd97; color: var(--personal-text); }
.ev-slot.multi-end-week.work { background: #b5d4f4; color: var(--work-text); }
.ev-slot.multi-end-week.holiday { background: #f5c0c0; color: #c0392b; }
.ev-slot-label { pointer-events: none; }
.ev-slot-empty { min-height: 20px; cursor: pointer; }
.ev-more-cell { font-size: 10px; color: var(--text-hint); padding: 1px 6px; }

/* 주간 */
.week-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1.5px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 140px); }
.week-head { display: grid; grid-template-columns: 52px repeat(7,1fr); background: var(--surface); border-bottom: 1.5px solid var(--border); flex-shrink: 0; }
.week-head-cell { text-align: center; padding: 12px 4px; }
.week-wd { font-size: 10px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
.week-dn { font-size: 20px; font-weight: 400; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin: 4px auto 0; border-radius: 50%; }
.week-head-cell.today .week-dn { background: var(--accent); color: #fff; font-weight: 700; }
.week-body-wrap { flex: 1; overflow-y: auto; }
.week-body { display: grid; grid-template-columns: 52px repeat(7,1fr); }
.time-slot { height: 52px; border-bottom: 1px solid var(--border); font-size: 10px; color: var(--text-hint); text-align: right; padding: 4px 8px 0; font-weight: 500; }
.week-col { border-right: 1px solid var(--border); position: relative; }
.week-slot { height: 52px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.week-slot:hover { background: var(--accent-light); }
.week-ev { position: absolute; left: 4px; right: 4px; border-radius: var(--radius-xs); padding: 3px 7px; font-size: 11px; font-weight: 600; overflow: hidden; cursor: pointer; z-index: 1; border-left: 3px solid transparent; transition: opacity 0.12s; }
.week-ev:hover { opacity: 0.85; }
.week-ev.personal { background: var(--personal-bg); color: var(--personal-text); border-left-color: var(--personal); }
.week-ev.work { background: var(--work-bg); color: var(--work-text); border-left-color: var(--work); }
.week-ev.holiday { background: #fff0f0; color: #c0392b; border-left-color: #e74c3c; }

/* 모달 */
.overlay { position: fixed; inset: 0; background: rgba(30,35,64,0.2); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 24px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md); }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-head h3 { font-size: 17px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; color: var(--text); }
.close-btn { background: var(--surface2); border: none; cursor: pointer; color: var(--text-sub); font-size: 18px; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.close-btn:hover { background: var(--border); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
.field input, .field textarea, .field select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }
.field textarea { resize: vertical; min-height: 90px; }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.btn-danger { color: #c0392b; border-color: #ffd4d4; background: #fff5f5; }
.btn-danger:hover { background: #ffe8e8; border-color: #c0392b; color: #c0392b; }
.empty { text-align: center; padding: 24px 12px; color: var(--text-hint); font-size: 12px; }

/* 프로필 메뉴 */
.profile-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #8b9ef7 0%, #5b6ef5 50%, #4455e0 100%); border: 2px solid #fff; box-shadow: 0 0 0 1.5px var(--accent), 0 2px 8px rgba(0,0,0,0.12); color: #fff; font-size: 13px; font-family: 'ONE-Mobile-Title', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: normal; transition: all 0.18s; position: relative; flex-shrink: 0; }
.profile-btn:hover { box-shadow: 0 0 0 1.5px var(--accent), 0 4px 14px rgba(0,0,0,0.16); transform: scale(1.07); }
.profile-menu { position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); min-width: 200px; z-index: 300; overflow: hidden; display: none; }
.profile-menu.open { display: block; }
.profile-menu-header { padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.profile-menu-header .label { font-size: 10px; color: var(--text-hint); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.profile-menu-header .email { font-size: 12px; color: var(--text-sub); }
.profile-menu-item { padding: 10px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text); transition: background 0.12s; border: none; background: none; width: 100%; font-family: 'ONE-Mobile-Title', sans-serif; text-align: left; }
.profile-menu-item:hover { background: var(--surface2); }
.profile-menu-item.danger { color: #c0392b; }
.profile-menu-item.danger:hover { background: #fff5f5; }
.profile-menu-divider { height: 1px; background: var(--border); margin: 2px 0; }
.profile-wrap { position: relative; }

/* 포스트잇 */
.postit { position: fixed; width: 200px; min-height: 120px; border-radius: 12px; padding: 0; box-shadow: 2px 3px 8px rgba(0,0,0,0.12); z-index: 150; display: flex; flex-direction: column; cursor: default; transition: box-shadow 0.15s, opacity 0.2s; user-select: none; overflow: hidden; }
.postit:hover { box-shadow: 2px 4px 12px rgba(0,0,0,0.16); }
.postit.personal { background: linear-gradient(160deg, #d4f0e0 0%, #c8ecd8 100%); }
.postit.work { background: linear-gradient(160deg, #d4e4fa 0%, #c4d8f8 100%); }
.postit.hidden-postit { display: none; }
.postit-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px 4px; cursor: grab; }
.postit-header:active { cursor: grabbing; }
.postit-tag { font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.4); letter-spacing: 0.5px; }
.postit-actions { display: flex; gap: 4px; }
.postit-btn { background: none; border: none; cursor: pointer; color: rgba(0,0,0,0.35); font-size: 14px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.12s, color 0.12s; padding: 0; }
.postit-btn:hover { background: rgba(0,0,0,0.1); color: rgba(0,0,0,0.7); }
.postit-body { flex: 1; padding: 2px 12px 14px; font-size: 13px; line-height: 1.6; color: rgba(0,0,0,0.75); white-space: pre-wrap; word-break: break-word; font-family: 'Sunchon', sans-serif; min-height: 80px; }
.postit-fold-line { display: none; }
#postit-toggle { position: fixed; bottom: 20px; right: 20px; width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 12px rgba(0,0,0,0.15); z-index: 160; transition: all 0.15s; }
#postit-toggle:hover { transform: scale(1.08); }
#postit-toggle.all-hidden { background: var(--text-sub); }

/* 투두 패널 버튼 */
.todo-panel-btn { position: relative; width: 32px; height: 32px; border-radius: var(--radius-xs); border: 1.5px solid var(--border); background: var(--surface); color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.todo-panel-btn:hover, .todo-panel-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.todo-badge { position: absolute; top: -4px; right: -4px; width: 14px; height: 14px; background: #e05555; color: #fff; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1.5px solid var(--surface); }

/* 투두 사이드 패널 */
.todo-panel { position: fixed; top: 0; right: -340px; width: 320px; height: 100vh; background: var(--surface); border-left: 1.5px solid var(--border); box-shadow: -4px 0 20px rgba(0,0,0,0.1); z-index: 190; display: flex; flex-direction: column; transition: right 0.25s cubic-bezier(0.4,0,0.2,1); }
.todo-panel.open { right: 0; }
.todo-panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1.5px solid var(--border); font-size: 14px; font-weight: 600; background: var(--surface); flex-shrink: 0; font-family: 'ONE-Mobile-Title', sans-serif; }
.todo-panel-quick { padding: 12px 16px; border-bottom: 1.5px solid var(--border); background: var(--surface2); flex-shrink: 0; }
.todo-panel-quick input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; font-family: 'Sunchon', sans-serif; }
.todo-panel-quick input:focus { border-color: var(--accent); }
.todo-panel-body { flex: 1; overflow-y: auto; padding: 8px 16px; }

/* 투두 리스트 */
.todo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.todo-add-quick-btn { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.todo-add-quick-btn:hover { transform: scale(1.1); opacity: 0.9; }
.todo-quick-input { margin-bottom: 8px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; animation: slideDown 0.15s ease; }
@keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.todo-quick-input input { width: 100%; border: none; background: transparent; font-size: 12px; color: var(--text); outline: none; font-family: 'Sunchon', sans-serif; }
.todo-input-actions { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.todo-select { flex: 1; font-size: 11px; padding: 3px 6px; border: 1px solid var(--border); border-radius: var(--radius-xs); background: var(--surface); color: var(--text); font-family: 'Sunchon', sans-serif; }
.todo-detail-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px; }
.todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 2px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; border-radius: var(--radius-xs); }
.todo-item:last-child { border-bottom: none; }
.todo-item:hover { background: var(--bg); }
.todo-checkbox { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; border: 1.5px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--surface); }
.todo-checkbox.checked { background: var(--accent); border-color: var(--accent); }
.todo-checkbox.checked::after { content: ''; width: 4px; height: 7px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
.todo-checkbox.personal { border-color: var(--personal); }
.todo-checkbox.personal.checked { background: var(--personal); border-color: var(--personal); }
.todo-checkbox.work { border-color: var(--work); }
.todo-checkbox.work.checked { background: var(--work); border-color: var(--work); }
.todo-content { flex: 1; min-width: 0; }
.todo-text { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4; }
.todo-text.done { text-decoration: line-through; color: var(--text-hint); }
.todo-due-label { font-size: 10px; color: var(--text-hint); margin-top: 1px; }
.todo-due-label.overdue { color: #e05555; font-weight: 600; }
.todo-completed-toggle { width: 100%; background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text-hint); padding: 6px 0 2px; text-align: left; font-family: 'Sunchon', sans-serif; display: flex; align-items: center; gap: 4px; }
.todo-completed-toggle:hover { color: var(--text-sub); }

/* 테마 */
.theme-panel { padding: 12px 14px; border-top: 1px solid var(--border); }
.theme-panel-title { font-size: 11px; font-weight: 700; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.theme-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.theme-row label { font-size: 12px; color: var(--text-sub); font-family: 'Sunchon', sans-serif; }
.dark-toggle { width: 36px; height: 20px; background: var(--border); border-radius: 10px; border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
.dark-toggle.on { background: var(--accent); }
.dark-toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
.dark-toggle.on::after { left: 19px; }
.color-wheel-wrap { display: flex; align-items: center; gap: 10px; }
.color-wheel-wrap input[type="color"] { width: 36px; height: 36px; border: 2px solid var(--border); border-radius: 50%; cursor: pointer; padding: 2px; background: none; flex-shrink: 0; }
.preset-colors { display: flex; gap: 6px; flex-wrap: wrap; }
.preset-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; flex-shrink: 0; }
.preset-dot:hover { transform: scale(1.15); }
.preset-dot.active { border-color: var(--text); transform: scale(1.1); }

/* 모바일 상단바 */
.topbar-mobile { display: none; background: var(--surface); border-bottom: 1.5px solid var(--border); flex-direction: column; flex-shrink: 0; }
.mob-row1 { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px 5px; }
.mob-row2 { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px 8px; gap: 8px; }
.mob-actions { display: flex; gap: 5px; flex-shrink: 0; }
.mobile-icon-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.mobile-icon-btn:hover { background: var(--bg); color: var(--accent); border-color: var(--accent); }
.mobile-icon-btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.mobile-icon-btn.accent:hover { opacity: 0.9; }
.topbar-mobile-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.mobile-action-col { display: flex; flex-direction: column; gap: 4px; }

@media (max-width: 640px) {
  .todo-panel { width: 100%; right: -100%; border-left: none; }
  .todo-panel.open { right: 0; }
  #topbar-pc { display: none !important; }
  .topbar-mobile { display: flex; }
  .sidebar { display: none; }
  .toolbar { padding: 6px 10px; gap: 5px; }
  .period-label { min-width: auto; font-size: 13px; font-weight: 600; }
  .nav-btn { width: 28px; height: 28px; font-size: 14px; }
  .view-seg button { padding: 4px 10px; font-size: 11px; }
  .cal-area { padding: 6px; }
  .month-wrap { min-height: calc(100vh - 140px); }
  .month-week { min-height: 80px; }

function newId() { return nextId++; }
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2,'0'); }

function loadGoogleScript(cb) {
  if (window.google) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = cb;

function signIn(type) {
  loadGoogleScript(() => {
    // 매번 새 tokenClient 생성 (모바일 재로그인 호환)
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      prompt: '',
      callback: (resp) => {
        if (resp.error) {
          console.error('로그인 오류:', resp.error, resp.error_description);
          alert('로그인 실패: ' + (resp.error_description || resp.error));
          return;
        }
        // 이메일을 구글 API로 자동 가져오기
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: `Bearer ${resp.access_token}` }
        })
        .then(r => r.json())
        .then(info => {
          const email = info.email || prompt(`${type === 'personal' ? '개인' : '업무'} 계정 이메일:`);
          if (!email) return;
          const existing = accounts.find(a => a.type === type);
          if (existing) { existing.token = resp.access_token; existing.email = email; }
          else accounts.push({ type, email, token: resp.access_token });
          save();
          showApp();
          fetchCalendarEvents(type, resp.access_token);
          // 로그인 성공 후 45분 후 자동 갱신 예약
          scheduleTokenRefresh(type, email, 45 * 60 * 1000);
        })
        .catch(() => {
          const email = prompt(`${type === 'personal' ? '개인' : '업무'} 계정 이메일:`);
          if (!email) return;
          const existing = accounts.find(a => a.type === type);
          if (existing) { existing.token = resp.access_token; existing.email = email; }
          else accounts.push({ type, email, token: resp.access_token });
          save();
          showApp();
          fetchCalendarEvents(type, resp.access_token);
          // 로그인 성공 후 45분 후 자동 갱신 예약
          scheduleTokenRefresh(type, email, 45 * 60 * 1000);
        });
      }
    });
    tc.requestAccessToken({ prompt: 'select_account' });
  });
}

function fetchCalendarEvents(type, token) {
  const now = new Date();
  const from = new Date(now.getFullYear(), 0, 1).toISOString();       // 올해 1월 1일
  const to = new Date(now.getFullYear() + 1, 11, 31).toISOString(); // 내년 12월 31일
  const headers = { Authorization: `Bearer ${token}` };

  function parseItems(items, calType) {
    items.forEach(item => {
      const start = item.start?.dateTime || item.start?.date || '';
      const end = item.end?.dateTime || item.end?.date || '';
      if (!start) return;
      const startDate = start.split('T')[0];
      // 구글 종일 이벤트의 end는 마지막날 다음날이므로 -1일 처리
      let endDate = end.split('T')[0];
      if (!end.includes('T') && endDate > startDate) {
        // 날짜 문자열 직접 처리 (시간대 영향 없이)
        const [ey, em, ed] = endDate.split('-').map(Number);
        const prev = new Date(ey, em - 1, ed - 1);
        endDate = `${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,'0')}-${String(prev.getDate()).padStart(2,'0')}`;
      }
      events.push({
        id: newId(),
        title: item.summary || '(제목 없음)',
        date: startDate,
        endDate: endDate,
        start: start.includes('T') ? start.split('T')[1].slice(0,5) : '00:00',
        end: end.includes('T') ? end.split('T')[1].slice(0,5) : '23:59',
        account: calType,
        memo: item.description || '',
        source: 'google',
        googleId: item.id
      });
    });
  }

  fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers })
    .then(r => r.json())
    .then(async listData => {
      if (!listData.items) return;
      // 이 계정 이벤트 초기화 (공휴일은 personal 계정일 때만 초기화)
      events = events.filter(e => {
        if (e.source !== 'google') return true;
        if (e.account === type) return false;
        if (e.account === 'holiday' && type === 'personal') return false;
        return true;
      });

      const fetchPromises = listData.items.map(cal => {
        const calId = encodeURIComponent(cal.id);
        const isHoliday = cal.id.includes('holiday') || (cal.summary || '').includes('공휴일');
        const calType = isHoliday ? 'holiday' : type;

        // 공휴일은 개인 계정에서만 불러오기 (중복 방지)
        if (isHoliday && type !== 'personal') return Promise.resolve();

        // 페이지네이션으로 전체 불러오기
        async function fetchAllPages(pageToken) {
          let url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events?timeMin=${from}&timeMax=${to}&singleEvents=true&orderBy=startTime&maxResults=500`;
          if (pageToken) url += `&pageToken=${pageToken}`;
          const data = await fetch(url, { headers }).then(r => r.json());
          if (data.items) parseItems(data.items, calType);
          if (data.nextPageToken) await fetchAllPages(data.nextPageToken);
        }
        return fetchAllPages(null).catch(e => console.error('캘린더 불러오기 실패:', cal.summary, e));
      });

      await Promise.all(fetchPromises);
      save(); render();
    })
    .catch(e => console.error('캘린더 목록 불러오기 실패:', e));
}

function logoutAccount(type) {
  if (!confirm(`${type === 'personal' ? '개인' : '업무'} 계정을 로그아웃할까요?`)) return;
  accounts = accounts.filter(a => a.type !== type);

  activeAccounts = activeAccounts.filter(a => a !== type);

  save();
  closeProfileMenu();
  if (!accounts.length) {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  } else {
    render();

}

function logoutAll() {
  if (!confirm('모든 계정에서 로그아웃할까요?')) return;
  accounts = []; events = []; memos = [];
  activeAccounts = ['personal', 'work'];
  save();

  document.getElementById('login-screen').style.display = 'flex';
}

  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');

  ['dark-toggle-pc', 'dark-toggle-mob'].forEach(id => {

  });

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r, g, b};
}

function lighten(hex, amount) {
  const {r,g,b} = hexToRgb(hex);
  const mix = (c) => Math.min(255, Math.round(c + (255-c) * amount));
  return '#' + [mix(r),mix(g),mix(b)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function applyAccentColor(hex, save=true) {
  accentColor = hex;
  if (save) localStorage.setItem('theme_accent', hex);
  const light = lighten(hex, 0.88);
  const root = document.documentElement;
  root.style.setProperty('--accent', hex);
  root.style.setProperty('--accent-light', light);
  root.style.setProperty('--work', hex);
  root.style.setProperty('--work-bg', light);
  // 컬러피커 값 동기화
  ['color-picker-pc', 'color-picker-mob'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = hex;
  });
  // 프리셋 활성 상태 업데이트
  document.querySelectorAll('.preset-dot').forEach(dot => {
    dot.classList.toggle('active', dot.dataset.color === hex);
  });
}

function renderPresetColors() {
  ['preset-colors-pc', 'preset-colors-mob'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = PRESET_COLORS.map(p => `
      <div class="preset-dot ${p.color === accentColor ? 'active' : ''}"
        style="background:${p.color}"
        data-color="${p.color}"
        title="${p.name}"
        onclick="applyAccentColor('${p.color}')">
      </div>`).join('');
  });
}

// ── 토큰 자동 갱신 ──
let tokenRefreshTimers = {};

function scheduleTokenRefresh(type, email, delayMs) {
  if (tokenRefreshTimers[type]) clearTimeout(tokenRefreshTimers[type]);
  tokenRefreshTimers[type] = setTimeout(() => {
    silentRefreshToken(type, email);
  }, delayMs);
}

function silentRefreshToken(type, email) {
  loadGoogleScript(() => {
    try {
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        hint: email,
        prompt: 'none',  // 완전 silent - 팝업/리디렉션 없음
        error_callback: (err) => {
          // 'user_logged_out' 등 silent 불가 시 조용히 실패
          console.warn('Silent 갱신 불가:', err.type);
          // 팝업 없이 실패 -> 토큰 있으면 계속 사용, 없으면 배너
          const acc = accounts.find(a => a.type === type);
          if (!acc || !acc.token) showTokenBanner();
        },
        callback: (resp) => {
          if (!resp.error && resp.access_token) {
            const acc = accounts.find(a => a.type === type);
            if (acc) {
              acc.token = resp.access_token;
              const tokensOnly = accounts.reduce((obj, a) => { if(a.token) obj[a.type]=a.token; return obj; }, {});
              try { sessionStorage.setItem('cal_tokens', JSON.stringify(tokensOnly)); } catch(e) {}
              window._calTokens = tokensOnly;
              hideTokenBanner();
              console.log(`토큰 자동갱신 성공: ${type}`);
              // 오프라인 큐 처리
              if (type === 'personal') {
                setTimeout(async () => {
                  if (offlineQueue.memos) await saveMemosToDrive();
                  if (offlineQueue.todos) await saveTodosToDrive();
                }, 300);
              }
              // 45분 후 다시 갱신 예약 (토큰 유효시간 60분 기준)
              scheduleTokenRefresh(type, email, 45 * 60 * 1000);
            }
          } else {
            console.warn(`토큰 자동갱신 실패: ${type}`, resp.error);
            showTokenBanner();
          }
        }
      });
      tc.requestAccessToken({ prompt: '' });
    } catch(e) {
      console.warn('토큰 갱신 오류:', e);
      showTokenBanner();
    }
  });
}

function startAutoRefresh() {
  accounts.forEach(acc => {
    if (acc.email) {
      // 앱 시작 후 50분마다 갱신 (즉시 첫 갱신 후 45분 주기)
      scheduleTokenRefresh(acc.type, acc.email, 50 * 60 * 1000);
    }
  });
}

function hideTokenBanner() {

}

function reconnectAll() {
  // 모든 계정 순서대로 재연결
  const toReconnect = [...accounts];
  hideTokenBanner();
  function reconnectNext(i) {
    if (i >= toReconnect.length) return;
    const acc = toReconnect[i];
    loadGoogleScript(() => {
      try {
        const tc = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          hint: acc.email,
          callback: (resp) => {
            if (!resp.error && resp.access_token) {
              acc.token = resp.access_token;
              const tokensOnly = accounts.reduce((obj, a) => { if(a.token) obj[a.type]=a.token; return obj; }, {});
              try { sessionStorage.setItem('cal_tokens', JSON.stringify(tokensOnly)); } catch(e) {}
              window._calTokens = tokensOnly;
              fetchCalendarEvents(acc.type, resp.access_token);
              if (acc.type === 'personal') {
                setTimeout(() => { loadMemosFromDrive(); loadTodosFromDrive(); }, 500);
              }
            }
            reconnectNext(i + 1);
          }
        });
        tc.requestAccessToken({ prompt: 'select_account' });
      } catch(e) { reconnectNext(i + 1); }
    });
  }
  reconnectNext(0);
}

function visibleEvents() {
  return events
    .filter(e => activeAccounts.includes(e.account) || e.account === 'holiday')
    .map(e => ({ ...e, endDate: e.endDate || e.date }));
}

// 특정 날짜에 표시할 이벤트 (다중일 일정 포함)
function eventsOnDate(evs, ds) {
  return evs.filter(e => {
    const start = e.date;
    const end = e.endDate || e.date;
    return ds >= start && ds <= end;
  });
}

// 이벤트가 해당 날짜에서 시작하는지 (이어진 표시용)
function isFirstDay(e, ds) { return e.date === ds; }
function isLastDay(e, ds) { return (e.endDate || e.date) === ds; }
function isMultiDay(e) { return e.endDate && e.endDate > e.date; }

function navigate(dir) {

function renderMonth() {
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('period-label').textContent = `${y}년 ${MONTHS_KO[m]}`;
  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const prev = new Date(y, m, 0).getDate();
  const evs = visibleEvents();

  // 주 단위 날짜 배열 생성 (null 날짜도 포함)
  const weeks = [];
  let week = [];
  for (let i = 0; i < first; i++) week.push({ date: null, d: prev - first + i + 1 });
  for (let d = 1; d <= daysInMonth; d++) {
    week.push({ date: `${y}-${pad(m+1)}-${pad(d)}`, d });
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length > 0) {
    let extra = 1;
    while (week.length < 7) week.push({ date: null, d: extra++ });
    weeks.push(week);
  }

  function layoutWeekEvents(weekDates) {
    const slots = [];
    const validDates = weekDates.map(w => w.date).filter(Boolean);
    if (!validDates.length) return slots;
    const weekStart = validDates[0];
    const weekEnd = validDates[validDates.length - 1];

    // 이 주에 겹치는 모든 이벤트
    const weekEvs = evs.filter(e => {
      const eEnd = e.endDate || e.date;
      return e.date <= weekEnd && eEnd >= weekStart;
    });

    // 긴 이벤트 먼저
    weekEvs.sort((a, b) =>
      (new Date(b.endDate||b.date) - new Date(b.date)) -
      (new Date(a.endDate||a.date) - new Date(a.date))
    );

    weekEvs.forEach(ev => {
      const eStart = ev.date < weekStart ? weekStart : ev.date;
      const eEnd = (ev.endDate||ev.date) > weekEnd ? weekEnd : (ev.endDate||ev.date);

      // 날짜 → 인덱스 변환
      // weekDates는 [일,월,화,...,토] 7개, date가 null인 칸 있음
      let si = -1, ei = -1;
      for (let i = 0; i < 7; i++) {
        if (weekDates[i].date === eStart) si = i;
        if (weekDates[i].date === eEnd)   ei = i;
      }
      // 못 찾으면 첫/마지막 유효 칸으로 대체
      if (si === -1) for (let i = 0; i < 7; i++) { if (weekDates[i].date) { si = i; break; } }
      if (ei === -1) for (let i = 6; i >= 0; i--) { if (weekDates[i].date) { ei = i; break; } }
      if (si === -1 || ei === -1 || ei < si) return;

      // 빈 row 찾기
      let row = 0;
      while (row < 20) {
        if (!slots[row]) slots[row] = Array(7).fill(null);
        let ok = true;
        for (let i = si; i <= ei; i++) if (slots[row][i]) { ok = false; break; }
        if (ok) {
          for (let i = si; i <= ei; i++) {
            slots[row][i] = {
              ev, isStart: i === si, span: ei - si + 1,
              startsBeforeWeek: ev.date < weekStart,
              endsAfterWeek: (ev.endDate||ev.date) > weekEnd
            };
          }
          break;
        }
        row++;
      }
    });
    return slots;
  }


  const head = DAYS.map(d => `<div class="month-head-cell">${d}</div>`).join('');
  const SHOW_ROWS = 3;
  let weeksHtml = '';

  weeks.forEach(weekDates => {
    const slots = layoutWeekEvents(weekDates);
    const maxSlots = slots.length;

    // 날짜 행
    let dayRow = '<div class="month-row-dates">';
    weekDates.forEach(({ date, d }) => {
      dayRow += `<div class="month-cell-date ${!date?'other':''} ${date===todayStr?'today':''}" onclick="${date?`openDayDetail('${date}')`:''}"><div class="day-n">${d}</div></div>`;
    });
    dayRow += '</div>';

    // 이벤트 슬롯 행
    let evRows = '';
    for (let row = 0; row < Math.min(maxSlots, SHOW_ROWS); row++) {
      evRows += '<div class="month-row-evs">';
      let i = 0;
      while (i < 7) {
        const cell = slots[row]?.[i];
        if (cell && cell.isStart) {
          const { ev, span, startsBeforeWeek, endsAfterWeek } = cell;
          const isMulti = (ev.endDate && ev.endDate > ev.date);
          let cls = `ev-slot ${ev.account}`;
          if (isMulti) {
            const rStart = !startsBeforeWeek;
            const rEnd = !endsAfterWeek;
            if (rStart && rEnd) cls += ' multi-full';
            else if (rStart) cls += ' multi-start';
            else if (rEnd) cls += ' multi-end-week';
            else cls += ' multi-cont';
          }
          const showLabel = !startsBeforeWeek;
          evRows += `<div class="${cls}" style="grid-column:span ${span}" onclick="showEventDetail(${ev.id})" title="${escapeHtml(ev.title)}"><span class="ev-slot-label">${showLabel ? ev.title : '&nbsp;'}</span></div>`;
          i += span;
        } else if (cell && !cell.isStart) {
          i++;
        } else {
          const date = weekDates[i]?.date;
          evRows += `<div class="ev-slot-empty" onclick="${date?`openDayDetail('${date}')`:''}"></div>`;
          i++;
        }
      }
      evRows += '</div>';
    }

    // 넘치는 이벤트
    if (maxSlots > SHOW_ROWS) {
      let moreRow = '<div class="month-row-evs">';
      weekDates.forEach(({ date }) => {
        if (!date) { moreRow += '<div class="ev-slot-empty"></div>'; return; }
        const cnt = evs.filter(e => e.date <= date && (e.endDate||e.date) >= date).length;
        const hidden = cnt - SHOW_ROWS;
        moreRow += `<div class="ev-slot-empty ev-more-cell" onclick="openDayDetail('${date}')">${hidden > 0 ? `+${hidden}개` : ''}</div>`;
      });
      moreRow += '</div>';
      evRows += moreRow;
    }

    weeksHtml += `<div class="month-week">${dayRow}${evRows}</div>`;
  });

  document.getElementById('cal-area').innerHTML = `
    <div class="month-wrap">
      <div class="month-head">${head}</div>
      <div class="month-weeks">${weeksHtml}</div>
    </div>`;
}

function renderWeek() {
  const d = new Date(current);
  d.setDate(d.getDate() - d.getDay());
  const ws = new Date(d);
  const we = new Date(d); we.setDate(we.getDate() + 6);
  document.getElementById('period-label').textContent =
    `${ws.getFullYear()}년 ${MONTHS_KO[ws.getMonth()]} ${ws.getDate()}일 — ${MONTHS_KO[we.getMonth()]} ${we.getDate()}일`;
  const evs = visibleEvents();
  let head = '<div></div>';
  for (let i = 0; i < 7; i++) {
    const dd = new Date(ws); dd.setDate(dd.getDate() + i);
    const ds = fmtDate(dd);
    head += `<div class="week-head-cell ${ds === todayStr ? 'today' : ''}">
      <div class="week-wd">${DAYS[i]}</div>
      <div class="week-dn">${dd.getDate()}</div>
    </div>`;
  }
  let timecol = '';
  for (let h = 0; h < 24; h++) timecol += `<div class="time-slot">${pad(h)}:00</div>`;
  let cols = '';
  for (let i = 0; i < 7; i++) {
    const dd = new Date(ws); dd.setDate(dd.getDate() + i);
    const ds = fmtDate(dd);
    const dayEvs = eventsOnDate(evs, ds);
    let slots = '';
    for (let h = 0; h < 24; h++) slots += `<div class="week-slot" onclick="openEventModalAt('${ds}','${pad(h)}:00')"></div>`;
    const evHtml = dayEvs.map(e => {
      const [sh, sm] = e.start.split(':').map(Number);
      const [eh, em] = e.end.split(':').map(Number);
      const top = (sh * 60 + sm) / 60 * 52;
      const h = Math.max(((eh * 60 + em) - (sh * 60 + sm)) / 60 * 52, 24);
      return `<div class="week-ev ${e.account}" style="top:${top}px;height:${h}px" onclick="showEventDetail(${e.id})">${escapeHtml(e.title)}</div>`;
    }).join('');
    cols += `<div class="week-col">${slots}${evHtml}</div>`;
  }
  document.getElementById('cal-area').innerHTML = `
    <div class="week-wrap">
      <div class="week-head">${head}</div>
      <div class="week-body-wrap">
        <div class="week-body">
          <div class="time-col">${timecol}</div>${cols}
        </div>
      </div>
    </div>`;
}

  document.getElementById('ev-date').value = date;
  document.getElementById('ev-start').value = time;
  const h = parseInt(time.split(':')[0]);
  document.getElementById('ev-end').value = `${pad(Math.min(h+1,23))}:00`;
}

async function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { alert('제목을 입력하세요'); return; }
  const endDateVal = document.getElementById('ev-enddate').value;
  const account = document.getElementById('ev-account').value;
  const ev = {
    id: editingEventId || newId(),
    title, date: document.getElementById('ev-date').value,
    endDate: endDateVal || document.getElementById('ev-date').value,
    start: document.getElementById('ev-start').value,
    end: document.getElementById('ev-end').value,
    account,
    memo: document.getElementById('ev-memo').value,
    source: 'google'
  };

  closeModal('event-overlay');

  if (editingEventId) {
    // 수정
    const existing = events.find(e => e.id === editingEventId);
    ev.googleId = existing?.googleId;
    events = events.map(e => e.id === editingEventId ? ev : e);
    save(); render();
    await updateToGoogle(ev);
  } else {
    // 신규: 로컬에 먼저 저장 후 구글에 업로드
    events.push(ev);
    save(); render();
    const googleId = await saveToGoogle(ev);
    if (googleId) {
      ev.googleId = googleId;
      events = events.map(e => e.id === ev.id ? ev : e);
      save();
    }
  }
}

// 계정 토큰 가져오기
function getToken(accountType) {
  const acc = accounts.find(a => a.type === accountType);
  return acc ? acc.token : null;
}

// 구글 캘린더에 일정 저장 (신규)
async function saveToGoogle(ev) {
  const token = getToken(ev.account);
  if (!token) return null;
  const body = buildGoogleEventBody(ev);
  const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { console.error('구글 저장 실패', await res.text()); return null; }
  const data = await res.json();
  return data.id;
}

// 구글 캘린더 일정 수정
async function updateToGoogle(ev) {
  const token = getToken(ev.account);
  if (!token || !ev.googleId) return;
  const body = buildGoogleEventBody(ev);
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${ev.googleId}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) console.error('구글 수정 실패', await res.text());
}

// 구글 캘린더 일정 삭제
async function deleteFromGoogle(ev) {
  const token = getToken(ev.account);
  if (!token || !ev.googleId) return;
  await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${ev.googleId}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${token}` }
  });
}

// 구글 API 요청 바디 생성
function buildGoogleEventBody(ev) {
  const isAllDay = ev.start === '00:00' && ev.end === '23:59';
  const endDate = ev.endDate || ev.date;
  if (isAllDay) {
    // 종일 이벤트: 구글은 end를 다음날로
    const nextDay = new Date(endDate);
    nextDay.setDate(nextDay.getDate() + 1);
    return {
      summary: ev.title,
      description: ev.memo || '',
      start: { date: ev.date },
      end: { date: nextDay.toISOString().split('T')[0] }
    };
  }
  return {
    summary: ev.title,
    description: ev.memo || '',
    start: { dateTime: `${ev.date}T${ev.start}:00`, timeZone: 'Asia/Seoul' },
    end: { dateTime: `${endDate}T${ev.end}:00`, timeZone: 'Asia/Seoul' }
  };
}

// 드래그 (마우스)
function startDrag(e, id) {
  if (e.target.closest('.postit-btn')) return;
  e.preventDefault();
  const el = document.getElementById(`postit-${id}`);
  const startX = e.clientX - el.offsetLeft;
  const startY = e.clientY - el.offsetTop;
  el.style.zIndex = 200;

  function onMove(e) {
    el.style.left = (e.clientX - startX) + 'px';
    el.style.top = (e.clientY - startY) + 'px';
  }
  function onUp() {
    postitPositions[id] = { x: el.offsetLeft, y: el.offsetTop };
    localStorage.setItem('postit_pos', JSON.stringify(postitPositions));
    el.style.zIndex = 150;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// 드래그 (터치)
function startDragTouch(e, id) {
  if (e.target.closest('.postit-btn')) return;
  const el = document.getElementById(`postit-${id}`);
  const touch = e.touches[0];
  const startX = touch.clientX - el.offsetLeft;
  const startY = touch.clientY - el.offsetTop;
  el.style.zIndex = 200;

  function onMove(e) {
    const t = e.touches[0];
    el.style.left = (t.clientX - startX) + 'px';
    el.style.top = (t.clientY - startY) + 'px';
  }
  function onEnd() {
    postitPositions[id] = { x: el.offsetLeft, y: el.offsetTop };
    localStorage.setItem('postit_pos', JSON.stringify(postitPositions));
    el.style.zIndex = 150;
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  }
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('touchend', onEnd);
}

let editingTodoId = null;
let showCompleted = false;
let showPanelCompleted = false;

function saveTodo() {
  const text = document.getElementById('todo-text').value.trim();
  if (!text) { alert('할 일을 입력하세요'); return; }
  const todo = {
    id: editingTodoId || newId(),
    text,
    account: document.getElementById('todo-account').value,
    due: document.getElementById('todo-due').value,
    note: document.getElementById('todo-note').value,
    done: editingTodoId ? (todos.find(t => t.id === editingTodoId)?.done || false) : false,
    createdAt: editingTodoId ? (todos.find(t => t.id === editingTodoId)?.createdAt || fmtDate(new Date())) : fmtDate(new Date())
  };
  if (editingTodoId) todos = todos.map(t => t.id === editingTodoId ? todo : t);
  else todos.unshift(todo);
  save(); saveTodosToDrive(); closeModal('todo-overlay'); renderTodos();

function deleteCurrentTodo() {
  if (!editingTodoId || !confirm('삭제할까요?')) return;
  todos = todos.filter(t => t.id !== editingTodoId);
  save(); saveTodosToDrive(); closeModal('todo-overlay'); renderTodos();

function toggleTodo(id) {
  const t = todos.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  save(); saveTodosToDrive(); renderTodos();
}

function toggleCompletedTodos() {
  showCompleted = !showCompleted;
  renderTodos();
}

function renderTodos() {
  const today = fmtDate(new Date());
  const active = todos.filter(t => !t.done && activeAccounts.includes(t.account));
  const done = todos.filter(t => t.done && activeAccounts.includes(t.account));

  function renderItem(t) {
    const overdue = t.due && t.due < today && !t.done;
    return `<div class="todo-item" onclick="openTodoModal(${t.id})">
      <div class="todo-checkbox ${t.account} ${t.done ? 'checked' : ''}"
        onclick="event.stopPropagation();toggleTodo(${t.id})"></div>
      <div class="todo-content">
        <div class="todo-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</div>
        ${t.due ? `<div class="todo-due-label ${overdue?'overdue':''}">
          ${overdue?'⚠️ ':'📅 '}${t.due}</div>` : ''}
      </div>
    </div>`;
  }

  // 사이드바 (PC)
  const listEl = document.getElementById('todo-list');
  if (listEl) {
    const emptyEl = document.getElementById('todo-empty');
    const toggleEl = document.getElementById('todo-completed-toggle');
    const doneListEl = document.getElementById('todo-completed-list');
    listEl.innerHTML = active.map(renderItem).join('');
    emptyEl.style.display = active.length ? 'none' : 'block';
    if (done.length) {
      toggleEl.style.display = 'flex';
      toggleEl.innerHTML = `${showCompleted?'▲':'▼'} 완료된 항목 (${done.length})`;
      doneListEl.style.display = showCompleted ? 'block' : 'none';
      doneListEl.innerHTML = done.map(renderItem).join('');
    } else { toggleEl.style.display = 'none'; doneListEl.style.display = 'none'; }
  }

  // 패널
  const panelListEl = document.getElementById('todo-panel-list');
  if (panelListEl) {
    const panelEmptyEl = document.getElementById('todo-panel-empty');
    const panelToggleEl = document.getElementById('todo-panel-completed-toggle');
    const panelDoneEl = document.getElementById('todo-panel-completed-list');
    panelListEl.innerHTML = active.map(renderItem).join('');
    panelEmptyEl.style.display = active.length ? 'none' : 'block';
    if (done.length) {
      panelToggleEl.style.display = 'flex';
      panelToggleEl.innerHTML = `${showPanelCompleted?'▲':'▼'} 완료된 항목 (${done.length})`;
      panelDoneEl.style.display = showPanelCompleted ? 'block' : 'none';
      panelDoneEl.innerHTML = done.map(renderItem).join('');
    } else { panelToggleEl.style.display = 'none'; panelDoneEl.style.display = 'none'; }
  }

  // 배지 업데이트
  const badge = document.getElementById('todo-badge');
  if (badge) {
    const overdueCnt = active.filter(t => t.due && t.due < today).length;
    if (overdueCnt > 0) {
      badge.style.display = 'flex';
      badge.textContent = overdueCnt;
    } else { badge.style.display = 'none'; }
  }
}
