<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memo Calendar</title>
<style>
@font-face {
  font-family: 'ONE-Mobile-Title';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/ONE-Mobile-Title.woff') format('woff');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Sunchon';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/SuncheonR.woff') format('woff');
  font-weight: 400;
  font-display: swap;
}
@font-face {
  font-family: 'Sunchon';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/SuncheonB.woff') format('woff');
  font-weight: 700;
  font-display: swap;
}
</style>
<style>
:root {
  --bg: #eef1f8;
  --surface: #ffffff;
  --surface2: #f4f6fc;
  --border: #e4e8f4;
  --text: #1e2340;
  --text-sub: #7b82a0;
  --text-hint: #b0b6cc;
  --accent: #5b6ef5;
  --accent-light: #eef0fe;
  --personal: #3db87a;
  --personal-bg: #e8f8f1;
  --personal-border: #a8e4c4;
  --personal-text: #1e7a4e;
  --work: #5b6ef5;
  --work-bg: #eef0fe;
  --work-border: #c0c8fa;
  --work-text: #3040c0;
  --purple: #9b6ef5;
  --purple-bg: #f2eefe;
  --holiday: #e74c3c;
  --holiday-bg: #fff0f0;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 2px 12px rgba(91,110,245,0.08);
  --shadow-md: 0 4px 24px rgba(91,110,245,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sunchon', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ── 로그인 ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(135deg, #e8ecf8 0%, #f0eefa 100%);
}
.login-card {
  background: var(--surface);
  border-radius: 24px;
  padding: 44px 40px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  box-shadow: var(--shadow-md);
}
.login-logo {
  width: 56px; height: 56px;
  background: var(--accent-light);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-size: 26px;
}
.login-card h1 { font-size: 22px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; margin-bottom: 8px; color: var(--text); }
.login-card > p { font-size: 13px; color: var(--text-sub); margin-bottom: 32px; line-height: 1.7; }
.google-btn {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-weight: normal;
  font-family: 'ONE-Mobile-Title', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.15s;
  margin-bottom: 10px;
}
.google-btn:hover { background: var(--surface2); border-color: var(--accent); }
.login-note { font-size: 11px; color: var(--text-hint); margin-top: 24px; line-height: 1.7; }

/* ── 앱 ── */
#app { display: none; height: 100vh; flex-direction: column; overflow: hidden; }

.topbar {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 1px 0 var(--border);
}
.app-title {
  font-size: 16px;
  font-weight: normal;
  font-family: 'ONE-Mobile-Title', sans-serif;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.account-chips { display: flex; gap: 6px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
  user-select: none;
}
.chip.personal { background: var(--personal-bg); color: var(--personal-text); border-color: var(--personal-border); }
.chip.work { background: var(--work-bg); color: var(--work-text); border-color: var(--work-border); }
.chip.holiday { background: #fff0f0; color: #c0392b; border-color: #f5c0c0; }
.chip.off { opacity: 0.3; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-weight: normal;
  font-family: 'ONE-Mobile-Title', sans-serif;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
.btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(91,110,245,0.25);
}
.btn.primary:hover { opacity: 0.9; box-shadow: 0 4px 12px rgba(91,110,245,0.35); }
.btn.sm { padding: 6px 12px; font-size: 12px; }

.toolbar {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.period-nav { display: flex; align-items: center; gap: 4px; }
.nav-btn {
  width: 32px; height: 32px;
  border-radius: var(--radius-xs);
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-sub);
  transition: all 0.12s;
  font-family: inherit;
}
.nav-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.period-label { font-size: 16px; font-weight: 600; min-width: 160px; color: var(--text); }
.view-seg {
  margin-left: auto;
  display: flex;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.view-seg button {
  padding: 5px 16px;
  border: none;
  background: transparent;
  font-size: 12px;
  font-weight: normal;
  font-family: 'ONE-Mobile-Title', sans-serif;
  color: var(--text-sub);
  cursor: pointer;
  border-radius: var(--radius-xs);
  transition: all 0.15s;
}
.view-seg button.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: 0 1px 4px rgba(91,110,245,0.15);
}

.body { display: flex; flex: 1; overflow: hidden; }

/* ── 사이드바 ── */
.sidebar {
  width: 220px;
  border-right: 1.5px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.sidebar-section h4 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-hint);
  margin-bottom: 10px;
}

/* 미니 캘린더 */
.mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.mini-cal-title { font-size: 13px; font-weight: 600; color: var(--text); }
.mini-nav {
  background: none; border: none; cursor: pointer;
  color: var(--accent); padding: 3px 6px;
  font-size: 14px; border-radius: var(--radius-xs);
  transition: background 0.12s;
}
.mini-nav:hover { background: var(--accent-light); }
.mini-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; text-align: center; }
.mini-wd { font-size: 9px; color: var(--text-hint); padding: 2px 0; font-weight: 700; text-transform: uppercase; }
.mini-d {
  font-size: 11px; padding: 4px 1px;
  border-radius: 50%; cursor: pointer;
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  transition: background 0.12s; color: var(--text);
}
.mini-d:hover { background: var(--accent-light); color: var(--accent); }
.mini-d.today { background: var(--accent); color: #fff; font-weight: 700; }
.mini-d.other { color: var(--text-hint); }

/* 계정 */
.account-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  font-size: 12px; background: var(--surface2);
  margin-bottom: 6px;
}
.account-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.account-email { color: var(--text-sub); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.account-label { font-weight: 600; font-size: 12px; }

/* 메모 */
.memo-item {
  padding: 9px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  background: var(--surface);
  transition: all 0.12s;
}
.memo-item:hover { border-color: var(--accent); background: var(--accent-light); }
.memo-item-title { font-size: 12px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; color: var(--text); }
.memo-item-date { font-size: 10px; color: var(--text-hint); }
.tag {
  font-size: 10px; padding: 2px 7px;
  border-radius: 20px; font-weight: 600;
  display: inline-flex; align-items: center;
}
.tag.personal { background: var(--personal-bg); color: var(--personal-text); }
.tag.work { background: var(--work-bg); color: var(--work-text); }

/* ── 캘린더 영역 ── */
.cal-area { flex: 1; overflow: auto; background: var(--bg); padding: 16px; }

/* 월간 */
.month-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1.5px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 140px);
}
.month-head { display: grid; grid-template-columns: repeat(7,1fr); background: var(--surface2); border-bottom: 1.5px solid var(--border); }
.month-head-cell { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-sub); padding: 10px 4px; letter-spacing: 0.5px; }
.month-weeks { display: flex; flex-direction: column; flex: 1; }
.month-week {
  border-bottom: 1px solid var(--border);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 120px;
}
.month-row-dates { display: grid; grid-template-columns: repeat(7, 1fr); flex-shrink: 0; }
.month-cell-date {
  border-right: 1px solid var(--border);
  padding: 6px 6px 2px;
  cursor: pointer;
  background: var(--surface);
  transition: background 0.1s;
  min-height: 32px;
}
.month-cell-date:last-child { border-right: none; }
.month-cell-date:hover { background: var(--bg); }
.month-cell-date.other { background: var(--surface2); }
.month-cell-date.other .day-n { color: var(--text-hint); }
.month-cell-date.today .day-n {
  background: var(--accent); color: #fff;
  border-radius: 50%;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.day-n {
  font-size: 12px; font-weight: 600;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
}
.month-row-evs {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  min-height: 24px;
  padding: 0 2px 2px;
  flex-shrink: 0;
}
.ev-slot {
  font-size: 11px; font-weight: 600;
  padding: 2px 7px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; transition: opacity 0.12s;
  margin: 1px 2px; min-width: 0;
  border-radius: var(--radius-xs);
  border-left: 3px solid transparent;
}
.ev-slot:hover { opacity: 0.8; }

/* 단일 일정 */
.ev-slot.personal { background: var(--personal-bg); color: var(--personal-text); border-left-color: var(--personal); }
.ev-slot.work { background: var(--work-bg); color: var(--work-text); border-left-color: var(--work); }
.ev-slot.holiday { background: #fff0f0; color: #c0392b; border-left-color: #e74c3c; }

/* 이어진 일정 - 시작 (왼쪽 둥글, 오른쪽 직각, 오른쪽 마진 없음) */
.ev-slot.multi-start { border-radius: var(--radius-xs) 0 0 var(--radius-xs); margin-right: 0; }
.ev-slot.multi-start.personal { background: #c0dd97; color: var(--personal-text); border-left-color: var(--personal); }
.ev-slot.multi-start.work { background: #b5d4f4; color: var(--work-text); border-left-color: var(--work); }
.ev-slot.multi-start.holiday { background: #f5c0c0; color: #c0392b; border-left-color: #e74c3c; }

/* 이어진 일정 - 전체(이 주 안에서 시작+끝) */
.ev-slot.multi-full { border-radius: var(--radius-xs); }
.ev-slot.multi-full.personal { background: #c0dd97; color: var(--personal-text); border-left-color: var(--personal); }
.ev-slot.multi-full.work { background: #b5d4f4; color: var(--work-text); border-left-color: var(--work); }
.ev-slot.multi-full.holiday { background: #f5c0c0; color: #c0392b; border-left-color: #e74c3c; }

/* 이어진 일정 - 중간 (양쪽 직각, 마진 없음) */
.ev-slot.multi-cont { border-radius: 0; margin-left: 0; margin-right: 0; border-left: none; }
.ev-slot.multi-cont.personal { background: #c0dd97; color: var(--personal-text); }
.ev-slot.multi-cont.work { background: #b5d4f4; color: var(--work-text); }
.ev-slot.multi-cont.holiday { background: #f5c0c0; color: #c0392b; }

/* 이어진 일정 - 끝 (왼쪽 직각, 오른쪽 둥글) */
.ev-slot.multi-end-week { border-radius: 0 var(--radius-xs) var(--radius-xs) 0; margin-left: 0; border-left: none; }
.ev-slot.multi-end-week.personal { background: #c0dd97; color: var(--personal-text); }
.ev-slot.multi-end-week.work { background: #b5d4f4; color: var(--work-text); }
.ev-slot.multi-end-week.holiday { background: #f5c0c0; color: #c0392b; }

.ev-slot-label { pointer-events: none; }
.ev-slot-empty { min-height: 20px; cursor: pointer; }
.ev-more-cell { font-size: 10px; color: var(--text-hint); padding: 1px 6px; }

/* 주간 */
.week-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: calc(100vh - 140px);
}
.week-head { display: grid; grid-template-columns: 52px repeat(7,1fr); background: var(--surface); border-bottom: 1.5px solid var(--border); flex-shrink: 0; }
.week-head-cell { text-align: center; padding: 12px 4px; }
.week-wd { font-size: 10px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
.week-dn {
  font-size: 20px; font-weight: 400;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  margin: 4px auto 0; border-radius: 50%;
  color: var(--text);
}
.week-head-cell.today .week-dn { background: var(--accent); color: #fff; font-weight: 700; }
.week-body-wrap { flex: 1; overflow-y: auto; }
.week-body { display: grid; grid-template-columns: 52px repeat(7,1fr); }
.time-slot {
  height: 52px;
  border-bottom: 1px solid var(--border);
  font-size: 10px; color: var(--text-hint);
  text-align: right; padding: 4px 8px 0;
  font-weight: 500;
}
.week-col { border-right: 1px solid var(--border); position: relative; }
.week-slot { height: 52px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.week-slot:hover { background: var(--accent-light); }
.week-ev {
  position: absolute; left: 4px; right: 4px;
  border-radius: var(--radius-xs);
  padding: 3px 7px;
  font-size: 11px; font-weight: 600;
  overflow: hidden; cursor: pointer; z-index: 1;
  border-left: 3px solid transparent;
  transition: opacity 0.12s;
}
.week-ev:hover { opacity: 0.85; }
.week-ev.personal { background: var(--personal-bg); color: var(--personal-text); border-left-color: var(--personal); }
.week-ev.work { background: var(--work-bg); color: var(--work-text); border-left-color: var(--work); }
.week-ev.holiday { background: #fff0f0; color: #c0392b; border-left-color: #e74c3c; }

/* ── 모달 ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(30,35,64,0.2);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 200; padding: 16px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  width: 100%; max-width: 420px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-md);
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-head h3 { font-size: 17px; font-weight: normal; font-family: 'ONE-Mobile-Title', sans-serif; color: var(--text); }
.close-btn {
  background: var(--surface2); border: none; cursor: pointer;
  color: var(--text-sub); font-size: 18px;
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
.close-btn:hover { background: var(--border); }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--text-sub); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface2);
  color: var(--text); font-size: 13px;
  font-family: inherit; outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(91,110,245,0.1);
}
.field textarea { resize: vertical; min-height: 90px; }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.btn-danger { color: #e05555; border-color: #ffd4d4; background: #fff5f5; }
.btn-danger:hover { background: #ffe8e8; border-color: #e05555; color: #e05555; }

.empty { text-align: center; padding: 24px 12px; color: var(--text-hint); font-size: 12px; }

.profile-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #8b9ef7 0%, #5b6ef5 50%, #4455e0 100%);
  border: 2px solid #fff;
  box-shadow: 0 0 0 1.5px var(--accent), 0 2px 8px rgba(91,110,245,0.25);
  color: #fff;
  font-size: 13px;
  font-family: 'ONE-Mobile-Title', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: normal;
  transition: all 0.18s;
  position: relative;
  flex-shrink: 0;
  letter-spacing: -0.5px;
}
.profile-btn:hover {
  box-shadow: 0 0 0 1.5px var(--accent), 0 4px 14px rgba(91,110,245,0.4);
  transform: scale(1.07);
}
.profile-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  min-width: 200px;
  z-index: 300;
  overflow: hidden;
  display: none;
}
.profile-menu.open { display: block; }
.profile-menu-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.profile-menu-header .label { font-size: 10px; color: var(--text-hint); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.profile-menu-header .email { font-size: 12px; color: var(--text-sub); }
.profile-menu-item {
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  color: var(--text);
  transition: background 0.12s;

<script>
// =====================================================
// ⚠️ 클라이언트 ID를 여기에 입력하세요
// =====================================================
const CLIENT_ID = '89624804757-04d1eqmkmfl4fc04c03a3cjejovb36h8.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar';

let accounts = JSON.parse(localStorage.getItem('cal_accounts') || '[]');
let events = JSON.parse(localStorage.getItem('cal_events') || '[]');
let memos = JSON.parse(localStorage.getItem('cal_memos') || '[]');
let activeAccounts = JSON.parse(localStorage.getItem('cal_active') || '["personal","work"]');
let currentView = 'month';
let current = new Date();
let miniCurrent = new Date();
let editingEventId = null;
let editingMemoId = null;
let nextId = parseInt(localStorage.getItem('cal_nextid') || '1');

const today = new Date();
const todayStr = fmtDate(today);

function save() {
  localStorage.setItem('cal_accounts', JSON.stringify(accounts));
  localStorage.setItem('cal_events', JSON.stringify(events));
  localStorage.setItem('cal_memos', JSON.stringify(memos));
  localStorage.setItem('cal_active', JSON.stringify(activeAccounts));
  localStorage.setItem('cal_nextid', String(nextId));
}
function newId() { return nextId++; }
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2,'0'); }

const DAYS = ['일','월','화','수','목','금','토'];
const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function loadGoogleScript(cb) {
  if (window.google) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = cb;
  document.head.appendChild(s);
}

function signIn(type) {
  loadGoogleScript(() => {
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { alert('로그인 실패: ' + resp.error); return; }
        const email = prompt(`${type === 'personal' ? '개인' : '업무'} 계정 이메일을 입력하세요:`);
        if (!email) return;
        const existing = accounts.find(a => a.type === type);
        if (existing) { existing.token = resp.access_token; existing.email = email; }
        else accounts.push({ type, email, token: resp.access_token });
        save();
        showApp();
        fetchCalendarEvents(type, resp.access_token);
      }
    });
    tc.requestAccessToken({ prompt: 'consent' });
  });
}

function addAccount() {
  const existing = accounts.map(a => a.type);
  const type = existing.includes('personal') ? 'work' : 'personal';
  signIn(type);
}

function fetchCalendarEvents(type, token) {
  const now = new Date();
  const from = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();
  const to = new Date(now.getFullYear(), now.getMonth() + 3, 0).toISOString();
  const headers = { Authorization: `Bearer ${token}` };

  function parseItems(items, calType) {
    items.forEach(item => {
      const start = item.start?.dateTime || item.start?.date || '';
      const end = item.end?.dateTime || item.end?.date || '';
      if (!start) return;
      const startDate = start.split('T')[0];
      // 구글 종일 이벤트의 end는 마지막날 다음날이므로 -1일 처리
      let endDate = end.split('T')[0];
      if (!end.includes('T') && endDate > startDate) {
        const d = new Date(endDate);
        d.setDate(d.getDate() - 1);
        endDate = d.toISOString().split('T')[0];
      }
      events.push({
        id: newId(),
        title: item.summary || '(제목 없음)',
        date: startDate,
        endDate: endDate,
        start: start.includes('T') ? start.split('T')[1].slice(0,5) : '00:00',
        end: end.includes('T') ? end.split('T')[1].slice(0,5) : '23:59',
        account: calType,
        memo: item.description || '',
        source: 'google',
        googleId: item.id
      });
    });
  }

  fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers })
    .then(r => r.json())
    .then(async listData => {
      if (!listData.items) return;
      events = events.filter(e => e.source !== 'google' || (e.account !== type && e.account !== 'holiday'));

      const fetchPromises = listData.items.map(cal => {
        const calId = encodeURIComponent(cal.id);
        const isHoliday = cal.id.includes('holiday') || (cal.summary || '').includes('공휴일');
        const calType = isHoliday ? 'holiday' : type;
        return fetch(
          `https://www.googleapis.com/calendar/v3/calendars/${calId}/events?timeMin=${from}&timeMax=${to}&singleEvents=true&orderBy=startTime&maxResults=200`,
          { headers }
        )
        .then(r => r.json())
        .then(data => { if (data.items) parseItems(data.items, calType); })
        .catch(() => {});
      });

      await Promise.all(fetchPromises);
      save(); render();
    })
    .catch(e => console.error('캘린더 목록 불러오기 실패:', e));
}

function toggleProfileMenu() {
  const menu = document.getElementById('profile-menu');
  menu.classList.toggle('open');
  updateProfileMenu();
}

function updateProfileMenu() {
  const labels = { personal: '개인', work: '업무' };
  const colors = { personal: 'var(--personal)', work: 'var(--work)' };
  const el = document.getElementById('profile-menu-accounts');
  if (!accounts.length) {
    el.innerHTML = '<div class="profile-menu-item" style="color:var(--text-hint);cursor:default">연동된 계정 없음</div>';
    return;
  }
  el.innerHTML = accounts.map(a => `
    <div class="profile-menu-header">
      <div class="label">${labels[a.type] || a.type} 계정</div>
      <div class="email">${a.email}</div>
    </div>
    <button class="profile-menu-item danger" onclick="logoutAccount('${a.type}')">
      <span style="width:8px;height:8px;border-radius:50%;background:${colors[a.type]};display:inline-block"></span>
      ${labels[a.type]} 계정 로그아웃
    </button>`).join('<div class="profile-menu-divider"></div>');
}

function logoutAccount(type) {

function visibleEvents() { return events.filter(e => activeAccounts.includes(e.account) || e.account === 'holiday'); }

// 특정 날짜에 표시할 이벤트 (다중일 일정 포함)
function eventsOnDate(evs, ds) {
  return evs.filter(e => {
    const start = e.date;
    const end = e.endDate || e.date;
    return ds >= start && ds <= end;
  });
}

// 이벤트가 해당 날짜에서 시작하는지 (이어진 표시용)
function isFirstDay(e, ds) { return e.date === ds; }
function isLastDay(e, ds) { return (e.endDate || e.date) === ds; }
function isMultiDay(e) { return e.endDate && e.endDate > e.date; }

function jumpTo(ds) { current = new Date(ds); render(); }

function renderMonth() {
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('period-label').textContent = `${y}년 ${MONTHS_KO[m]}`;
  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const prev = new Date(y, m, 0).getDate();
  const evs = visibleEvents();

  // 주 단위 날짜 배열 생성 (null 날짜도 포함)
  const weeks = [];
  let week = [];
  for (let i = 0; i < first; i++) week.push({ date: null, d: prev - first + i + 1 });
  for (let d = 1; d <= daysInMonth; d++) {
    week.push({ date: `${y}-${pad(m+1)}-${pad(d)}`, d });
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length > 0) {
    let extra = 1;
    while (week.length < 7) week.push({ date: null, d: extra++ });
    weeks.push(week);
  }

  function layoutWeekEvents(weekDates) {
    const slots = [];
    // 이 주의 유효 날짜 범위
    const validDates = weekDates.map(w => w.date).filter(Boolean);
    if (!validDates.length) return slots;
    const weekStart = validDates[0];
    const weekEnd = validDates[validDates.length - 1];

    // 이 주에 걸치는 이벤트 (다중일 포함)
    const weekEvs = evs.filter(e => {
      const eEnd = e.endDate || e.date;
      return e.date <= weekEnd && eEnd >= weekStart;
    });

    // 긴 이벤트 먼저
    weekEvs.sort((a, b) => {
      const aLen = new Date(a.endDate||a.date) - new Date(a.date);
      const bLen = new Date(b.endDate||b.date) - new Date(b.date);
      return bLen - aLen;
    });

    weekEvs.forEach(ev => {
      const eStart = ev.date < weekStart ? weekStart : ev.date;
      const eEnd = (ev.endDate || ev.date) > weekEnd ? weekEnd : (ev.endDate || ev.date);

      // findIndex 대신 직접 인덱스 탐색 (null 날짜 건너뜀)
      let startIdx = -1, endIdx = -1;
      for (let i = 0; i < 7; i++) {
        if (weekDates[i].date === eStart) startIdx = i;
        if (weekDates[i].date === eEnd) endIdx = i;
      }
      // 시작일이 이 주 이전이면 0번부터
      if (startIdx === -1 && ev.date < weekStart) startIdx = weekDates.findIndex(w => w.date !== null);
      // 종료일이 이 주 이후면 마지막 유효 날짜까지
      if (endIdx === -1 && (ev.endDate||ev.date) > weekEnd) {
        for (let i = 6; i >= 0; i--) { if (weekDates[i].date !== null) { endIdx = i; break; } }
      }
      if (startIdx === -1 || endIdx === -1 || endIdx < startIdx) return;

      let row = 0;
      while (row <= 10) {
        if (!slots[row]) slots[row] = new Array(7).fill(null);
        let fits = true;
        for (let i = startIdx; i <= endIdx; i++) {
          if (slots[row][i]) { fits = false; break; }
        }
        if (fits) {
          for (let i = startIdx; i <= endIdx; i++) {
            slots[row][i] = {
              ev,
              isStart: i === startIdx,
              isEnd: i === endIdx,
              span: endIdx - startIdx + 1,
              startsBeforeWeek: ev.date < weekStart,
              endsAfterWeek: (ev.endDate||ev.date) > weekEnd
            };
          }
          break;
        }
        row++;
      }
    });
    return slots;
  }

  const head = DAYS.map(d => `<div class="month-head-cell">${d}</div>`).join('');
  const SHOW_ROWS = 3;
  let weeksHtml = '';

  weeks.forEach(weekDates => {
    const slots = layoutWeekEvents(weekDates);
    const maxSlots = slots.length;

    // 날짜 행
    let dayRow = '<div class="month-row-dates">';
    weekDates.forEach(({ date, d }) => {
      dayRow += `<div class="month-cell-date ${!date?'other':''} ${date===todayStr?'today':''}" onclick="${date?`openDayDetail('${date}')`:''}"><div class="day-n">${d}</div></div>`;
    });
    dayRow += '</div>';

    // 이벤트 슬롯 행
    let evRows = '';
    for (let row = 0; row < Math.min(maxSlots, SHOW_ROWS); row++) {
      evRows += '<div class="month-row-evs">';
      let i = 0;
      while (i < 7) {
        const cell = slots[row]?.[i];
        if (cell && cell.isStart) {
          const { ev, span, startsBeforeWeek, endsAfterWeek } = cell;
          const isMulti = (ev.endDate && ev.endDate > ev.date);
          let cls = `ev-slot ${ev.account}`;
          if (isMulti) {
            const rStart = !startsBeforeWeek;
            const rEnd = !endsAfterWeek;
            if (rStart && rEnd) cls += ' multi-full';
            else if (rStart) cls += ' multi-start';
            else if (rEnd) cls += ' multi-end-week';
            else cls += ' multi-cont';
          }
          const showLabel = !startsBeforeWeek;
          evRows += `<div class="${cls}" style="grid-column:span ${span}" onclick="showEventDetail(${ev.id})" title="${ev.title}"><span class="ev-slot-label">${showLabel ? ev.title : '&nbsp;'}</span></div>`;
          i += span;
        } else if (cell && !cell.isStart) {
          i++;
        } else {
          const date = weekDates[i]?.date;
          evRows += `<div class="ev-slot-empty" onclick="${date?`openDayDetail('${date}')`:''}"></div>`;
          i++;
        }
      }
      evRows += '</div>';
    }

    // 넘치는 이벤트
    if (maxSlots > SHOW_ROWS) {
      let moreRow = '<div class="month-row-evs">';
      weekDates.forEach(({ date }) => {
        if (!date) { moreRow += '<div class="ev-slot-empty"></div>'; return; }
        const cnt = evs.filter(e => e.date <= date && (e.endDate||e.date) >= date).length;
        const hidden = cnt - SHOW_ROWS;
        moreRow += `<div class="ev-slot-empty ev-more-cell" onclick="openDayDetail('${date}')">${hidden > 0 ? `+${hidden}개` : ''}</div>`;
      });
      moreRow += '</div>';
      evRows += moreRow;
    }

    weeksHtml += `<div class="month-week">${dayRow}${evRows}</div>`;
  });

  document.getElementById('cal-area').innerHTML = `
    <div class="month-wrap">
      <div class="month-head">${head}</div>
      <div class="month-weeks">${weeksHtml}</div>
    </div>`;
}

function renderWeek() {
  const d = new Date(current);
  d.setDate(d.getDate() - d.getDay());
  const ws = new Date(d);
  const we = new Date(d); we.setDate(we.getDate() + 6);
  document.getElementById('period-label').textContent =
    `${ws.getFullYear()}년 ${MONTHS_KO[ws.getMonth()]} ${ws.getDate()}일 — ${MONTHS_KO[we.getMonth()]} ${we.getDate()}일`;
  const evs = visibleEvents();
  let head = '<div></div>';
  for (let i = 0; i < 7; i++) {
    const dd = new Date(ws); dd.setDate(dd.getDate() + i);
    const ds = fmtDate(dd);
    head += `<div class="week-head-cell ${ds === todayStr ? 'today' : ''}">
      <div class="week-wd">${DAYS[i]}</div>
      <div class="week-dn">${dd.getDate()}</div>
    </div>`;
  }
  let timecol = '';
  for (let h = 0; h < 24; h++) timecol += `<div class="time-slot">${pad(h)}:00</div>`;
  let cols = '';
  for (let i = 0; i < 7; i++) {
    const dd = new Date(ws); dd.setDate(dd.getDate() + i);
    const ds = fmtDate(dd);
    const dayEvs = eventsOnDate(evs, ds);
    let slots = '';
    for (let h = 0; h < 24; h++) slots += `<div class="week-slot" onclick="openEventModalAt('${ds}','${pad(h)}:00')"></div>`;
    const evHtml = dayEvs.map(e => {
      const [sh, sm] = e.start.split(':').map(Number);
      const [eh, em] = e.end.split(':').map(Number);
      const top = (sh * 60 + sm) / 60 * 52;
      const h = Math.max(((eh * 60 + em) - (sh * 60 + sm)) / 60 * 52, 24);
      return `<div class="week-ev ${e.account}" style="top:${top}px;height:${h}px" onclick="showEventDetail(${e.id})">${e.title}</div>`;
    }).join('');
    cols += `<div class="week-col">${slots}${evHtml}</div>`;
  }
  document.getElementById('cal-area').innerHTML = `
    <div class="week-wrap">
      <div class="week-head">${head}</div>
      <div class="week-body-wrap">
        <div class="week-body">
          <div class="time-col">${timecol}</div>${cols}
        </div>
      </div>
    </div>`;
}

async function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { alert('제목을 입력하세요'); return; }
  const endDateVal = document.getElementById('ev-enddate').value;
  const account = document.getElementById('ev-account').value;
  const ev = {
    id: editingEventId || newId(),
    title, date: document.getElementById('ev-date').value,
    endDate: endDateVal || document.getElementById('ev-date').value,
    start: document.getElementById('ev-start').value,
    end: document.getElementById('ev-end').value,
    account,
    memo: document.getElementById('ev-memo').value,
    source: 'google'
  };

  closeModal('event-overlay');

  if (editingEventId) {
    // 수정
    const existing = events.find(e => e.id === editingEventId);
    ev.googleId = existing?.googleId;
    events = events.map(e => e.id === editingEventId ? ev : e);
    save(); render();
    await updateToGoogle(ev);
  } else {
    // 신규: 로컬에 먼저 저장 후 구글에 업로드
    events.push(ev);
    save(); render();
    const googleId = await saveToGoogle(ev);
    if (googleId) {
      ev.googleId = googleId;
      events = events.map(e => e.id === ev.id ? ev : e);
      save();
    }
  }
}

// 계정 토큰 가져오기
function getToken(accountType) {
  const acc = accounts.find(a => a.type === accountType);
  return acc ? acc.token : null;
}

// 구글 캘린더에 일정 저장 (신규)
async function saveToGoogle(ev) {
  const token = getToken(ev.account);
  if (!token) return null;
  const body = buildGoogleEventBody(ev);
  const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { console.error('구글 저장 실패', await res.text()); return null; }
  const data = await res.json();
  return data.id;
}

// 구글 캘린더 일정 수정
async function updateToGoogle(ev) {
  const token = getToken(ev.account);
  if (!token || !ev.googleId) return;
  const body = buildGoogleEventBody(ev);
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${ev.googleId}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) console.error('구글 수정 실패', await res.text());
}

// 구글 캘린더 일정 삭제
async function deleteFromGoogle(ev) {
  const token = getToken(ev.account);
  if (!token || !ev.googleId) return;
  await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${ev.googleId}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${token}` }
  });
}

// 구글 API 요청 바디 생성
function buildGoogleEventBody(ev) {
  const isAllDay = ev.start === '00:00' && ev.end === '23:59';
  const endDate = ev.endDate || ev.date;
  if (isAllDay) {
    // 종일 이벤트: 구글은 end를 다음날로
    const nextDay = new Date(endDate);
    nextDay.setDate(nextDay.getDate() + 1);
    return {
      summary: ev.title,
      description: ev.memo || '',
      start: { date: ev.date },
      end: { date: nextDay.toISOString().split('T')[0] }
    };
  }
  return {
    summary: ev.title,
    description: ev.memo || '',
    start: { dateTime: `${ev.date}T${ev.start}:00`, timeZone: 'Asia/Seoul' },
    end: { dateTime: `${endDate}T${ev.end}:00`, timeZone: 'Asia/Seoul' }
  };
}

async function deleteCurrentEvent() {
  if (!editingEventId || !confirm('일정을 삭제할까요?')) return;

async function deleteEventById(id) {
  if (!confirm('일정을 삭제할까요?')) return;

  save(); closeModal('detail-overlay'); render();

function openDayDetail(ds) {
  const dayEvs = eventsOnDate(visibleEvents(), ds);
  const [y, m, d] = ds.split('-');
  let html = `<div class="modal-head"><h3>${parseInt(y)}년 ${parseInt(m)}월 ${parseInt(d)}일</h3><button class="close-btn" onclick="closeModal('detail-overlay')">×</button></div>`;
  if (!dayEvs.length) html += `<div class="empty">등록된 일정이 없습니다</div>`;
  else html += dayEvs.map(e => `
    <div class="detail-ev-card" onclick="closeModal('detail-overlay');showEventDetail(${e.id})">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
        <span class="tag ${e.account}">${e.account === 'personal' ? '개인' : '업무'}</span>
        <span style="font-weight:600;font-size:13px">${e.title}</span>
      </div>
      <div style="font-size:12px;color:var(--text-sub)">🕐 ${e.start} — ${e.end}</div>
    </div>`).join('');
  html += `<button class="btn primary" style="width:100%;justify-content:center;margin-top:10px" onclick="closeModal('detail-overlay');openEventModalAt('${ds}','09:00')">+ 이 날에 일정 추가</button>`;
  document.getElementById('detail-content').innerHTML = html;
  openModal('detail-overlay');
}

let postitPositions = JSON.parse(localStorage.getItem('postit_pos') || '{}');
let allHidden = false;

function openMemoModal(id) {
  editingMemoId = id;
  if (id) {
    const m = memos.find(x => x.id === id);
    document.getElementById('memo-modal-title').textContent = '메모 수정';
    document.getElementById('memo-content').value = m.content;
    document.getElementById('memo-account').value = m.account;
    document.getElementById('memo-delete-btn').style.display = 'inline-flex';
  } else {
    document.getElementById('memo-modal-title').textContent = '새 메모';
    document.getElementById('memo-content').value = '';
    document.getElementById('memo-account').value = 'personal';
    document.getElementById('memo-delete-btn').style.display = 'none';
  }
  openModal('memo-overlay');
}

function saveMemo() {
  const content = document.getElementById('memo-content').value.trim();
  if (!content) { alert('내용을 입력하세요'); return; }
  const mo = {
    id: editingMemoId || newId(),
    title: content.split('\n')[0].slice(0, 20),
    content,
    account: document.getElementById('memo-account').value,
    date: fmtDate(new Date())
  };
  if (editingMemoId) {
    memos = memos.map(m => m.id === editingMemoId ? mo : m);
    // 포스트잇 업데이트
    const el = document.getElementById(`postit-${mo.id}`);
    if (el) {
      el.querySelector('.postit-body').textContent = mo.content;
      el.querySelector('.postit-tag').textContent = mo.account === 'personal' ? '개인' : '업무';
      el.className = `postit ${mo.account}`;
    }
  } else {
    memos.push(mo);
    renderPostit(mo);
  }
  save(); closeModal('memo-overlay'); renderMemosSidebar();
}

function deleteCurrentMemo() {
  if (!editingMemoId || !confirm('메모를 삭제할까요?')) return;
  memos = memos.filter(m => m.id !== editingMemoId);
  const el = document.getElementById(`postit-${editingMemoId}`);
  if (el) el.remove();
  delete postitPositions[editingMemoId];
  localStorage.setItem('postit_pos', JSON.stringify(postitPositions));
  save(); closeModal('memo-overlay'); renderMemosSidebar();
}

function renderPostit(memo) {
  const container = document.getElementById('postit-container');
  const pos = postitPositions[memo.id] || {
    x: 80 + (Object.keys(postitPositions).length % 5) * 30,
    y: 100 + (Object.keys(postitPositions).length % 4) * 30
  };

  const el = document.createElement('div');
  el.className = `postit ${memo.account}${allHidden ? ' hidden-postit' : ''}`;
  el.id = `postit-${memo.id}`;
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';
  el.innerHTML = `
    <div class="postit-header" onmousedown="startDrag(event, ${memo.id})" ontouchstart="startDragTouch(event, ${memo.id})">
      <span class="postit-tag">${memo.account === 'personal' ? '개인' : '업무'}</span>
      <div class="postit-actions">
        <button class="postit-btn" onclick="openMemoModal(${memo.id})" title="수정">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="postit-btn" onclick="deleteMemoById(${memo.id})" title="삭제">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="postit-body">${memo.content}</div>
    <div class="postit-fold-line"></div>`;
  container.appendChild(el);
}

function deleteMemoById(id) {
  if (!confirm('메모를 삭제할까요?')) return;
  memos = memos.filter(m => m.id !== id);
  const el = document.getElementById(`postit-${id}`);
  if (el) el.remove();
  delete postitPositions[id];
  localStorage.setItem('postit_pos', JSON.stringify(postitPositions));
  save(); renderMemosSidebar();
}

function renderAllPostits() {
  const container = document.getElementById('postit-container');
  container.innerHTML = '';
  memos.forEach(m => renderPostit(m));
}

function togglePostits() {
  allHidden = !allHidden;
  document.querySelectorAll('.postit').forEach(el => {
    el.classList.toggle('hidden-postit', allHidden);
  });
  document.getElementById('postit-toggle').classList.toggle('all-hidden', allHidden);
}

// 드래그 (마우스)
function startDrag(e, id) {
  if (e.target.closest('.postit-btn')) return;
  e.preventDefault();
  const el = document.getElementById(`postit-${id}`);
  const startX = e.clientX - el.offsetLeft;
  const startY = e.clientY - el.offsetTop;
  el.style.zIndex = 200;

  function onMove(e) {
    el.style.left = (e.clientX - startX) + 'px';
    el.style.top = (e.clientY - startY) + 'px';
  }
  function onUp() {
    postitPositions[id] = { x: el.offsetLeft, y: el.offsetTop };
    localStorage.setItem('postit_pos', JSON.stringify(postitPositions));
    el.style.zIndex = 150;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// 드래그 (터치)
function startDragTouch(e, id) {
  if (e.target.closest('.postit-btn')) return;
  const el = document.getElementById(`postit-${id}`);
  const touch = e.touches[0];
  const startX = touch.clientX - el.offsetLeft;
  const startY = touch.clientY - el.offsetTop;
  el.style.zIndex = 200;

  function onMove(e) {
    const t = e.touches[0];
    el.style.left = (t.clientX - startX) + 'px';
    el.style.top = (t.clientY - startY) + 'px';
  }
  function onEnd() {
    postitPositions[id] = { x: el.offsetLeft, y: el.offsetTop };
    localStorage.setItem('postit_pos', JSON.stringify(postitPositions));
    el.style.zIndex = 150;
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  }
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('touchend', onEnd);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
</script>

<!-- 포스트잇 컨테이너 -->
<div id="postit-container"></div>
<!-- 포스트잇 접기 버튼 -->
<button id="postit-toggle" onclick="togglePostits()" title="메모 접기/펼치기">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/>
  </svg>
</button>

</body>
</html>
